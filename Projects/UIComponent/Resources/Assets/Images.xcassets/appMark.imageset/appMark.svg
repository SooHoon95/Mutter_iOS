<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Mutter app mark">
  <defs>
    <!-- 웜 아이보리 배경 (Ivory #FFFDF2 → 아주 옅은 블러시 하단) -->
    <linearGradient id="mm-bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FFFDF4"></stop>
      <stop offset="1" stop-color="#FBF1F5"></stop>
    </linearGradient>
    <!-- 편지 뒤 은은한 파스텔 광채 -->
    <radialGradient id="mm-glow" cx="0.5" cy="0.5" r="0.58">
      <stop offset="0" stop-color="#FBC4D9" stop-opacity="0.38"></stop>
      <stop offset="1" stop-color="#FBC4D9" stop-opacity="0"></stop>
    </radialGradient>
    <!-- 시그니처 파스텔 블러시: MutterGradient.gold 그대로 (peach → pink → lavender, 135°) -->
    <linearGradient id="mm-foil" x1="0.05" y1="0.05" x2="0.95" y2="0.95">
      <stop offset="0" stop-color="#FFE0C7"></stop>
      <stop offset="0.5" stop-color="#FBC4D9"></stop>
      <stop offset="1" stop-color="#D9C6F5"></stop>
    </linearGradient>
    <filter id="mm-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#C79BC9" flood-opacity="0.32"></feDropShadow>
    </filter>
  </defs>

  <!-- 라운드 배지 배경 + 은은한 로즈 테두리 (인앱 마크용) -->
  <rect width="1024" height="1024" rx="230" fill="url(#mm-bg)"></rect>
  <rect width="1024" height="1024" rx="230" fill="url(#mm-glow)"></rect>
  <rect x="6" y="6" width="1012" height="1012" rx="226" fill="none" stroke="#C77BAE" stroke-opacity="0.20" stroke-width="3"></rect>

  <!-- 편지 위로 떠오르는 빔 연결 8분음표 2개 (딥 플럼 onGold로 대비) -->
  <g stroke="#4A2038" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M497 424 V270"></path>
    <path d="M657 400 V246"></path>
    <path d="M497 274 L657 250" stroke-width="30"></path>
  </g>
  <ellipse cx="465" cy="428" rx="44" ry="34" fill="#4A2038" transform="rotate(-18 465 428)"></ellipse>
  <ellipse cx="625" cy="404" rx="44" ry="34" fill="#4A2038" transform="rotate(-18 625 404)"></ellipse>

  <!-- 스파클: 피치 + 라벤더로 파스텔 삼색 호응 -->
  <circle cx="742" cy="300" r="17" fill="#D9C6F5"></circle>
  <circle cx="360" cy="330" r="12" fill="#FFD3B0"></circle>

  <!-- 파스텔 블러시 편지(봉투) -->
  <g filter="url(#mm-soft)">
    <rect x="252" y="470" width="520" height="332" rx="52" fill="url(#mm-foil)"></rect>
    <!-- 봉투 플랩 V선 (딥 플럼, 은은하게) -->
    <path d="M272 508 L491 648 a44 38 0 0 0 42 0 L752 508" fill="none" stroke="#4A2038" stroke-opacity="0.42" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>
</svg>
