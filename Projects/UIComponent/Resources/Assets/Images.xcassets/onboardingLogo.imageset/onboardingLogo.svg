<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Mutter — 음악에 마음을 얹어">
  <defs>
    
    <linearGradient id="iv-foil" x1="0.05" y1="0.05" x2="0.95" y2="0.95">
      <stop offset="0" stop-color="#FFE0C7"></stop>
      <stop offset="0.5" stop-color="#FBC4D9"></stop>
      <stop offset="1" stop-color="#D9C6F5"></stop>
    </linearGradient>
    <linearGradient id="iv-word" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E3A9CF"></stop>
      <stop offset="0.52" stop-color="#C77BAE"></stop>
      <stop offset="1" stop-color="#8E4E7E"></stop>
    </linearGradient>
    <filter id="iv-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#8E4E7E" flood-opacity="0.30"></feDropShadow>
