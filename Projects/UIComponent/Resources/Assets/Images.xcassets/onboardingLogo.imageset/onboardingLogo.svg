      <path d="M268 470 L487 612 a46 40 0 0 0 50 0 L756 470" fill="none" stroke="#4A2038" stroke-opacity="0.55" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"></path>
    </g>
    <g fill="none" stroke="#6E561A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"><path d="M560 360 V250 l150 -34 v100"></path></g>
    <ellipse cx="540" cy="362" rx="34" ry="28" fill="#6E561A"></ellipse>
    <ellipse cx="690" cy="328" rx="34" ry="28" fill="#6E561A"></ellipse>
    <circle cx="772" cy="250" r="20" fill="#C77BAE"></circle>
    <circle cx="470" cy="300" r="14" fill="#C77BAE"></circle>
  </g>

  
  <text class="wm" x="250" y="322" text-anchor="middle" font-size="82" letter-spacing="-2" fill="url(#iv-word)">Mutter</text>

  
  <rect x="228" y="350" width="44" height="1.2" fill="#8E4E7E" fill-opacity="0.4"></rect>
